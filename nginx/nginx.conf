# ─── HemaSaree Nginx Configuration ──────────────────────────────────────────
# Load balancer + reverse proxy for Next.js app
# All free, no paid dependencies
# ─────────────────────────────────────────────────────────────────────────────

# ─── Upstream: Next.js app instances (Round-Robin Load Balancing) ──────────
# Docker Compose scales the next-app service; Nginx distributes traffic.
# Health checks ensure only healthy backends receive requests.

upstream nextjs_backends {
    # Round-robin (default) — distributes requests evenly
    server next-app-1:3000;
    server next-app-2:3000;
    server next-app-3:3000;

    # Health check: mark backends as down if unhealthy
    # Nginx will retry on the next backend
    # (requires nginx_upstream_check_module or commercial Nginx Plus)
    # For open-source Nginx, we rely on Docker health checks instead.

    # Keepalive connections to backends (reduces TCP handshake overhead)
    keepalive 32;
}

# ─── Rate Limiting Zones ────────────────────────────────────────────────────
# Defined at http level (this file is included in nginx.conf)
# $binary_remote_addr is 16 bytes for IPv4, saves memory

# General API rate limit: 10 req/sec per IP, burst of 20
limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;

# Auth endpoints: 5 req/sec per IP, burst of 10 (stricter)
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;

# Search: 20 req/sec per IP, burst of 40 (more lenient for browsing)
limit_req_zone $binary_remote_addr zone=api_search:10m rate=20r/s;

# Admin: 50 req/sec per IP, burst of 100 (trusted, higher limit)
limit_req_zone $binary_remote_addr zone=api_admin:10m rate=50r/s;

# Connection limiting: max 50 concurrent connections per IP
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ─── Server Block ───────────────────────────────────────────────────────────

server {
    listen 80;
    server_name hemasarees.com www.hemasarees.com;

    # Redirect HTTP to HTTPS (uncomment for production)
    # return 301 https://$host$request_uri;

    # ─── Security Headers ──────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ─── Gzip Compression ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ─── Connection Limits ─────────────────────────────────────────────
    limit_conn conn_limit 50;

    # ─── Client Body Size ──────────────────────────────────────────────
    client_max_body_size 10M;

    # ─── Static Files (Next.js public assets) ──────────────────────────
    location /_next/static/ {
        proxy_pass http://nextjs_backends;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Aggressive caching for static assets (immutable content-hashed)
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /images/ {
        proxy_pass http://nextjs_backends;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ─── Health Check Endpoint ─────────────────────────────────────────
    # Nginx can be checked by Docker or external monitoring
    location /nginx-health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # ─── Auth Endpoints (Stricter Rate Limit) ──────────────────────────
    location /api/auth/ {
        limit_req zone=api_auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs_backends;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    location /api/(signup|send-otp|verify-otp|forgot-password|reset-password) {
        limit_req zone=api_auth burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs_backends;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    # ─── Search Endpoints (Moderate Rate Limit) ────────────────────────
    location /api/search {
        limit_req zone=api_search burst=40 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs_backends;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    # ─── Admin Endpoints (Higher Rate Limit, Trusted) ──────────────────
    location /api/admin/ {
        limit_req zone=api_admin burst=100 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs_backends;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    # ─── All Other API Routes (General Rate Limit) ─────────────────────
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://nextjs_backends;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
    }

    # ─── Default: All Other Requests ───────────────────────────────────
    location / {
        proxy_pass http://nextjs_backends;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;

        # WebSocket support (for Next.js HMR in dev, if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── Custom 429 Error Page ─────────────────────────────────────────
    error_page 429 = @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"success":false,"error":"Too many requests. Please try again later."}';
    }
}

