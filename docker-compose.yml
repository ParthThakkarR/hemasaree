version: '3.8'

# ─── HemaSaree Docker Compose ──────────────────────────────────────────────
# Production-ready setup with:
# - Nginx reverse proxy with load balancing (3 Next.js instances)
# - MongoDB (single instance with replica set for future scaling)
# - Redis (for caching, rate limiting, Bull queue)
# - Health checks for all services
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── Nginx Reverse Proxy & Load Balancer ────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # For SSL (uncomment in production):
      # - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      next-app-1:
        condition: service_healthy
      next-app-2:
        condition: service_healthy
      next-app-3:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app-network

  # ─── Next.js App Instances (Horizontally Scalable) ──────────────────────
  next-app-1: &next-app
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=mongodb://mongodb:27017/hemasaree
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost}
      - ENABLE_CRON=true
      - RATE_LIMIT_MAX=100
      - RATE_LIMIT_WINDOW=60000
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - app-network

  next-app-2:
    <<: *next-app
    # No ports mapping — accessed only through Nginx

  next-app-3:
    <<: *next-app
    # No ports mapping — accessed only through Nginx

  # ─── MongoDB ────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    restart: always
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    networks:
      - app-network

  # ─── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 64M
    networks:
      - app-network

# ─── Networks ───────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
